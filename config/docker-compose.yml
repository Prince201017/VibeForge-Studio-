version: "3.9"
services:
  web:
    build: ./apps/web
    ports: ["3000:3000"]
    environment:
      - VITE_API_URL=http://python-service:8000
  python-service:
    build: ./python-service
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [redis]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
